<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRK Melm - Admin Panel (Zukunftssicher)</title>
    <style>
        /* Design & Layout */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #a8b0ba; margin: 0; padding: 20px; color: #333; }
        .admin-card { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #d7191f; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: #d7191f; margin: 0; font-size: 24px; }
        
        /* Login Bereich */
        #login-screen { text-align: center; padding: 50px 0; }
        .login-input { padding: 12px; width: 250px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-bottom: 10px; }
        
        /* Kalender-Navigation */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        .nav-button { background: #d7191f; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .nav-button:hover { background: #b01419; }
        .nav-info { text-align: center; }
        .nav-info strong { font-size: 18px; display: block; }

        /* Eingabemaske */
        .day-grid { display: grid; grid-template-columns: 80px 1.5fr 1fr 100px; gap: 15px; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .day-label { font-weight: 800; color: #d7191f; }
        input[type="text"], input[type="time"] { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; box-sizing: border-box; }
        
        /* Speichern & Status */
        .btn-save { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .btn-save:disabled { background: #6c757d; cursor: not-allowed; }
        #status-msg { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; text-align: center; font-weight: bold; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header">
        <h1>Dashboard Steuerung</h1>
        <img src="https://raw.githubusercontent.com/l-sayginsoy/drk-display/main/DRK-Logo_lang_RGB.png" height="35" alt="DRK Logo">
    </div>

    <div id="login-screen">
        <h2>Bitte anmelden</h2>
        <input type="password" id="admin-password" class="login-input" placeholder="Passwort eingeben..."><br>
        <button class="nav-button" onclick="attemptLogin()">Anmelden</button>
    </div>

    <div id="editor-ui" style="display: none;">
        <div class="nav-bar">
            <button class="nav-button" onclick="changeWeek(-1)">◀ Vorherige Woche</button>
            <div class="nav-info">
                <strong id="display-month-year">Monat Jahr</strong>
                <span>Kalenderwoche <span id="display-kw">--</span></span>
            </div>
            <button class="nav-button" onclick="changeWeek(1)">Nächste Woche ▶</button>
        </div>

        <div id="day-list">
            </div>

        <button id="save-all-btn" class="btn-save" onclick="saveToGitHub()">Planung permanent speichern</button>
        <div id="status-msg"></div>
        
        <p style="text-align: center; font-size: 12px; color: #666; margin-top: 15px;">
            Hinweis: Nach dem Speichern wird die Änderung in ca. 30-60 Sekunden auf dem Display sichtbar.
        </p>
        <button onclick="logout()" style="background: none; border: none; color: #999; text-decoration: underline; cursor: pointer; width: 100%; font-size: 11px; margin-top: 20px;">Abmelden & Token löschen</button>
    </div>
</div>

<script>
    // --- KONFIGURATION ---
    const CONFIG = {
        owner: "l-sayginsoy",
        repo: "drk-display",
        fileName: "wochenprogramm.txt",
        tokenKey: "drk_github_token"
    };

    let currentOffset = 0; // 0 = aktuelle Woche, 1 = nächste Woche, etc.
    let fullDatabase = {}; // Speichert alle Wochen-Einträge
    let githubToken = localStorage.getItem(CONFIG.tokenKey);

    // --- INITIALISIERUNG ---
    function attemptLogin() {
        const pw = document.getElementById('admin-password').value;
        if (pw === 'drk') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('editor-ui').style.display = 'block';
            startAdmin();
        } else {
            alert("Passwort nicht korrekt.");
        }
    }

    async function startAdmin() {
        if (!githubToken) {
            githubToken = prompt("Bitte gib deinen GitHub Personal Access Token ein (wird lokal gespeichert):");
            if (githubToken) localStorage.setItem(CONFIG.tokenKey, githubToken);
        }
        await loadData();
        renderCurrentWeek();
    }

    // --- KALENDER LOGIK ---
    function getWeekInfo(weekOffset) {
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + (weekOffset * 7));
        
        // ISO Woche berechnen
        const d = new Date(Date.UTC(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const year = d.getUTCFullYear();
        const week = Math.ceil((((d - new Date(Date.UTC(year, 0, 1))) / 86400000) + 1) / 7);
        
        const monthNames = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
        
        return {
            kw: week,
            year: year,
            monthLabel: monthNames[targetDate.getMonth()] + " " + targetDate.getFullYear(),
            idPrefix: `${year}-W${week.toString().padStart(2, '0')}`
        };
    }

    // --- DATEN-MANAGEMENT ---
    async function loadData() {
        showStatus("Lade Daten von GitHub...", "");
        try {
            const url = `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/${CONFIG.fileName}?t=${Date.now()}`;
            const response = await fetch(url);
            if (response.ok) {
                const text = await response.text();
                fullDatabase = {};
                text.split('\n').forEach(line => {
                    const [id, day, title, loc, time] = line.split('|');
                    if (id && id.includes('-W')) {
                        fullDatabase[id] = { day, title, loc, time };
                    }
                });
                showStatus("Daten erfolgreich geladen.", "success");
            } else {
                showStatus("Noch keine Daten vorhanden. Starte neu.", "success");
            }
        } catch (e) {
            showStatus("Fehler beim Laden: " + e.message, "error");
        }
    }

    function renderCurrentWeek() {
        const info = getWeekInfo(currentOffset);
        document.getElementById('display-month-year').textContent = info.monthLabel;
        document.getElementById('display-kw').textContent = info.kw;

        const days = ["MO", "DI", "MI", "DO", "FR", "SA", "SO"];
        const container = document.getElementById('day-list');
        container.innerHTML = "";

        days.forEach(dayName => {
            const id = `${info.idPrefix}-${dayName}`;
            const entry = fullDatabase[id] || { title: "", loc: "", time: "" };

            const row = document.createElement('div');
            row.className = 'day-grid';
            row.innerHTML = `
                <div class="day-label">${dayName}</div>
                <input type="text" class="in-title" data-id="${id}" value="${entry.title}" placeholder="Aktivität...">
                <input type="text" class="in-loc" data-id="${id}" value="${entry.loc}" placeholder="Ort...">
                <input type="time" class="in-time" data-id="${id}" value="${entry.time}">
            `;
            container.appendChild(row);
        });
    }

    function changeWeek(dir) {
        syncInputsToMemory(); // Erst Speichern, dann blättern
        currentOffset += dir;
        renderCurrentWeek();
    }

    function syncInputsToMemory() {
        document.querySelectorAll('.in-title').forEach(input => {
            const id = input.dataset.id;
            const parent = input.parentElement;
            const title = input.value;
            const loc = parent.querySelector('.in-loc').value;
            const time = parent.querySelector('.in-time').value;
            const dayName = parent.querySelector('.day-label').textContent;

            if (title || loc || time) {
                fullDatabase[id] = { day: dayName, title, loc, time };
            } else {
                delete fullDatabase[id];
            }
        });
    }

    async function saveToGitHub() {
        syncInputsToMemory();
        const btn = document.getElementById('save-all-btn');
        btn.disabled = true;
        showStatus("Synchronisiere mit GitHub...", "");

        // Textdatei Format: ID|Tag|Titel|Ort|Zeit
        const content = Object.keys(fullDatabase)
            .sort()
            .map(id => `${id}|${fullDatabase[id].day}|${fullDatabase[id].title}|${fullDatabase[id].loc}|${fullDatabase[id].time}`)
            .join('\n');

        try {
            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/dispatches`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${githubToken}`, 
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    event_type: 'update-dashboard', 
                    client_payload: { 
                        file: CONFIG.fileName, 
                        content: content,
                        message: `Planung Update KW ${getWeekInfo(0).kw}` 
                    } 
                })
            });

            if (response.ok) {
                showStatus("✅ Erfolgreich gespeichert! Änderungen werden gleich aktiv.", "success");
            } else {
                const errData = await response.json();
                throw new Error(errData.message || "GitHub API Fehler");
            }
        } catch (e) {
            showStatus("❌ Fehler beim Speichern: " + e.message, "error");
            if (e.message.includes("401") || e.message.includes("Token")) {
                localStorage.removeItem(CONFIG.tokenKey);
                alert("GitHub Token scheint ungültig zu sein. Bitte Seite neu laden.");
            }
        } finally {
            btn.disabled = false;
        }
    }

    function showStatus(msg, type) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        el.className = type;
        el.style.display = 'block';
        if (type === 'success') setTimeout(() => el.style.display = 'none', 8000);
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
