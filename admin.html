<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DRK Admin - SICHERHEITS MODUS</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .container { background: white; max-width: 800px; margin: 0 auto; padding: 20px; border-radius: 8px; border: 2px solid #d7191f; }
        h1 { color: #d7191f; margin-top: 0; }
        .week-nav { background: #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-radius: 5px; }
        .day-row { display: grid; grid-template-columns: 80px 1fr 1fr 100px; gap: 10px; padding: 10px 0; border-bottom: 1px solid #ddd; }
        input { padding: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        .btn { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
        .btn-save { background: #28a745; color: white; width: 100%; margin-top: 20px; font-size: 1.1em; }
        .btn-nav { background: #d7191f; color: white; }
        #status-box { margin-top: 15px; padding: 10px; font-size: 13px; background: #fff3f3; border: 1px solid #ffcccc; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/l-sayginsoy/drk-display/main/DRK-Logo_lang_RGB.png" width="150">
        <h1>Wochen-Planer</h1>

        <div id="status-box">Status: System bereit. Bitte Passwort eingeben.</div>

        <div id="login-section">
            <p>Passwort: <input type="password" id="pass" style="width:150px"> 
            <button class="btn btn-nav" onclick="login()">Anmelden</button></p>
        </div>

        <div id="main-ui" style="display:none;">
            <div class="week-nav">
                <button class="btn btn-nav" onclick="moveWeek(-1)">◀ Letzte Woche</button>
                <div style="text-align:center">
                    <strong id="label-week">KW --</strong><br>
                    <span id="label-date">--</span>
                </div>
                <button class="btn btn-nav" onclick="moveWeek(1)">Nächste Woche ▶</button>
            </div>

            <div id="editor">
                </div>

            <button class="btn btn-save" onclick="save()">Planung permanent speichern</button>
            <p style="text-align:center; font-size:11px; color:gray;">
                Nach dem Speichern dauert es ca. 30 Sek. bis das Display sich aktualisiert.
            </p>
        </div>
    </div>

    <script>
        const REPO = "l-sayginsoy/drk-display";
        const FILE = "wochenprogramm.txt";
        let db = {}; 
        let currentOffset = 0;
        let ghToken = localStorage.getItem("drk_token");

        function setStatus(msg) {
            document.getElementById("status-box").innerText = "Status: " + msg;
        }

        function login() {
            if (document.getElementById("pass").value === "drk") {
                document.getElementById("login-section").style.display = "none";
                document.getElementById("main-ui").style.display = "block";
                if (!ghToken) {
                    ghToken = prompt("GitHub Token eingeben:");
                    if (ghToken) localStorage.setItem("drk_token", ghToken);
                }
                loadFromGitHub();
            } else { alert("Falsches Passwort!"); }
        }

        function getWeekKey(offset) {
            let d = new Date();
            d.setDate(d.getDate() + (offset * 7));
            d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            let year = d.getFullYear();
            let week = Math.ceil((((d - new Date(year, 0, 1)) / 86400000) + 1) / 7);
            return year + "-W" + week.toString().padStart(2, '0');
        }

        async function loadFromGitHub() {
            setStatus("Lade Daten...");
            try {
                const url = `https://raw.githubusercontent.com/${REPO}/main/${FILE}?t=${Date.now()}`;
                const r = await fetch(url);
                if (r.ok) {
                    const text = await r.text();
                    db = {};
                    text.split("\n").forEach(line => {
                        const [id, day, tit, loc, tim] = line.split("|");
                        if (id && id.includes("-W")) db[id] = { day, tit, loc, tim };
                    });
                    setStatus("Daten geladen.");
                } else { setStatus("Datei noch leer oder neu."); }
                render();
            } catch (e) { setStatus("Fehler: " + e.message); }
        }

        function render() {
            const weekKey = getWeekKey(currentOffset);
            document.getElementById("label-week").innerText = "Woche: " + weekKey;
            
            const days = ["MO", "DI", "MI", "DO", "FR", "SA", "SO"];
            const cont = document.getElementById("editor");
            cont.innerHTML = "";

            days.forEach(d => {
                const id = weekKey + "-" + d;
                const row = db[id] || { tit: "", loc: "", tim: "" };
                cont.innerHTML += `
                    <div class="day-row">
                        <strong>${d}</strong>
                        <input type="text" class="in-t" data-id="${id}" value="${row.tit}" placeholder="Programm">
                        <input type="text" class="in-l" data-id="${id}" value="${row.loc}" placeholder="Ort">
                        <input type="time" class="in-h" data-id="${id}" value="${row.tim}">
                    </div>
                `;
            });
        }

        function moveWeek(dir) {
            saveToMemory();
            currentOffset += dir;
            render();
        }

        function saveToMemory() {
            document.querySelectorAll(".in-t").forEach(el => {
                const id = el.dataset.id;
                const row = el.parentElement;
                const tit = el.value;
                const loc = row.querySelector(".in-l").value;
                const tim = row.querySelector(".in-h").value;
                const day = row.querySelector("strong").innerText;
                if (tit || loc || tim) db[id] = { day, tit, loc, tim };
                else delete db[id];
            });
        }

        async function save() {
            saveToMemory();
            setStatus("Speichere auf GitHub...");
            const content = Object.keys(db).map(k => `${k}|${db.day}|${db.tit}|${db.loc}|${db.tim}`).join("\n");

            try {
                const r = await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ event_type: 'update-dashboard', client_payload: { file: FILE, content: content } })
                });
                if (r.ok) { alert("Gespeichert!"); setStatus("Erfolgreich gespeichert."); }
                else { alert("GitHub Fehler! Token prüfen."); setStatus("Fehler beim Senden."); }
            } catch (e) { alert("Fehler: " + e.message); }
        }
    </script>
</body>
</html>
