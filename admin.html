<script>
    const ADMIN_PASSWORD = "drk";
    const GITHUB_CONFIG = {
        owner: "l-sayginsoy",
        repo: "drk-display",
        branch: "main"
    };
    const GITHUB_RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/`;
    let GITHUB_TOKEN = null;
    
    let currentDate = new Date();
    let currentWeekOffset = 0;
    // Wir speichern die Daten lokal pro Woche, damit sie beim Blättern nicht verloren gehen
    let weekStorage = {}; 

    const MONTHS_DE = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
    const DAYS_DE = ['MO', 'DI', 'MI', 'DO', 'FR', 'SA', 'SO'];
    
    function getISOWeek(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function getTargetDate() {
        const d = new Date();
        d.setDate(d.getDate() + (currentWeekOffset * 7));
        return d;
    }

    function updateCalendarHeader() {
        const d = getTargetDate();
        document.getElementById('calendar-month-year').textContent = `${MONTHS_DE[d.getMonth()]} ${d.getFullYear()}`;
        document.getElementById('current-week').textContent = getISOWeek(d);
    }

    function navigateWeek(direction) {
        // Vor dem Blättern: Aktuelle Eingaben im Cache (weekStorage) zwischenspeichern
        saveToCache();
        
        currentWeekOffset += direction;
        updateCalendarHeader();
        generateWeekProgram();
        
        // Nach dem Blättern: Schauen, ob wir für diese Woche schon Daten im Cache haben
        loadFromCache();
    }

    function generateWeekProgram() {
        const container = document.getElementById('weekly-program');
        container.innerHTML = '';
        const locations = ['Kleiner Saal', 'Cafeteria', 'Garten', 'Terrasse', 'Wohnbereich', 'Speisesaal', 'Andere...'];
        
        DAYS_DE.forEach((day) => {
            const row = document.createElement('div');
            row.className = 'day-row';
            row.innerHTML = `
                <div class="day-label">${day}</div>
                <input type="text" class="input-title" placeholder="Veranstaltung" data-day="${day}">
                <div class="location-container">
                    <select class="select-location" data-day="${day}" onchange="checkCustomLoc(this)">
                        <option value="">Ort wählen...</option>
                        ${locations.map(loc => `<option value="${loc}">${loc}</option>`).join('')}
                    </select>
                    <input type="text" class="custom-location" placeholder="Anderer Ort..." style="display:none;" data-day="${day}">
                </div>
                <input type="time" class="input-time" data-day="${day}">
            `;
            container.appendChild(row);
        });
    }

    function checkCustomLoc(select) {
        const customInput = select.parentElement.querySelector('.custom-location');
        if (select.value === 'Andere...') {
            select.style.display = 'none';
            customInput.style.display = 'block';
            customInput.focus();
        }
    }

    function saveToCache() {
        const weekKey = `W${getISOWeek(getTargetDate())}-${getTargetDate().getFullYear()}`;
        const data = [];
        document.querySelectorAll('.day-row').forEach(row => {
            const day = row.querySelector('.day-label').textContent;
            const title = row.querySelector('.input-title').value;
            const sel = row.querySelector('.select-location');
            const cus = row.querySelector('.custom-location');
            const time = row.querySelector('.input-time').value;
            const location = (cus.style.display === 'block') ? cus.value : sel.value;
            
            if (title || location || time) {
                data.push({ day, title, location, time });
            }
        });
        weekStorage[weekKey] = data;
    }

    function loadFromCache() {
        const weekKey = `W${getISOWeek(getTargetDate())}-${getTargetDate().getFullYear()}`;
        const data = weekStorage[weekKey] || [];
        
        document.querySelectorAll('.day-row').forEach(row => {
            const day = row.querySelector('.day-label').textContent;
            const entry = data.find(d => d.day === day);
            if (entry) {
                row.querySelector('.input-title').value = entry.title;
                row.querySelector('.input-time').value = entry.time;
                const sel = row.querySelector('.select-location');
                const cus = row.querySelector('.custom-location');
                if (['Kleiner Saal', 'Cafeteria', 'Garten', 'Terrasse', 'Wohnbereich', 'Speisesaal', ''].includes(entry.location)) {
                    sel.value = entry.location;
                    sel.style.display = 'block';
                    cus.style.display = 'none';
                } else {
                    sel.value = 'Andere...';
                    sel.style.display = 'none';
                    cus.style.display = 'block';
                    cus.value = entry.location;
                }
            }
        });
    }

    async function login() {
        if (document.getElementById('password').value === ADMIN_PASSWORD) {
            GITHUB_TOKEN = await getGitHubToken();
            if (GITHUB_TOKEN) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                updateCalendarHeader();
                generateWeekProgram();
                await loadAllDataFromGitHub();
            }
        } else {
            alert("Falsches Passwort");
        }
    }

    async function getGitHubToken() {
        let token = sessionStorage.getItem("gh_token");
        if (!token) {
            token = prompt("Bitte GitHub Token eingeben:");
            if (token) sessionStorage.setItem("gh_token", token);
        }
        return token;
    }

    async function loadAllDataFromGitHub() {
        try {
            const resp = await fetch(`${GITHUB_RAW_BASE}wochenprogramm.txt?t=${Date.now()}`);
            if (resp.ok) {
                const text = await resp.text();
                // Da die Hauptseite nur 7 Zeilen versteht, laden wir diese in die AKTUELLE Woche des Admins
                const lines = text.split('\n').filter(l => l.includes('|'));
                const weekKey = `W${getISOWeek(getTargetDate())}-${getTargetDate().getFullYear()}`;
                weekStorage[weekKey] = lines.map(l => {
                    const [day, title, location, time] = l.split('|');
                    return { day, title, location, time };
                });
                loadFromCache();
            }
        } catch (e) { console.error("Ladefehler", e); }
    }

    async function saveWeeklyProgram() {
        const btn = document.getElementById('save-program-btn');
        btn.disabled = true;
        btn.textContent = "Speichert...";

        saveToCache(); // Aktuellen Stand sichern
        
        const weekKey = `W${getISOWeek(getTargetDate())}-${getTargetDate().getFullYear()}`;
        const currentData = weekStorage[weekKey] || [];
        
        // Wir erstellen genau 7 Zeilen (für jeden Tag eine), damit die Hauptseite nicht verwirrt ist
        const outputLines = DAYS_DE.map(day => {
            const entry = currentData.find(d => d.day === day) || { title: '', location: '', time: '' };
            return `${day}|${entry.title}|${entry.location}|${entry.time}`;
        });

        const content = outputLines.join('\n');

        try {
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/dispatches`;
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    event_type: 'update-dashboard', 
                    client_payload: { file: 'wochenprogramm.txt', content: content, message: `Update für KW ${getISOWeek(getTargetDate())}` } 
                })
            });

            if (resp.ok) {
                alert("✅ Gespeichert! Die Hauptseite zeigt nun diese Woche an. (Update dauert ca. 30 Sek.)");
            } else {
                throw new Error("GitHub API Fehler");
            }
        } catch (e) {
            alert("Fehler: " + e.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "Speichern";
        }
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }
</script>
