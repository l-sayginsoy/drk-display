<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRK Melm - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            background: #f8fafc;
        }
        .week-nav-btn {
            transition: all 0.2s ease;
        }
        .week-nav-btn:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@19.0.0';
        import ReactDOM from 'https://esm.sh/react-dom@19.0.0/client';

        const ADMIN_PASSWORD = "drk";
        const DAYS = ['MO', 'DI', 'MI', 'DO', 'FR', 'SA', 'SO'];
        const DAY_NAMES = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
        const LOCATIONS = ['Cafeteria', 'Kleiner Saal', 'Garten', 'Terrasse', 'Wohnbereich', 'Speisesaal'];

        // Korrekte KW-Berechnung - heute 31.01.2026 = KW 5
        const getWeekInfo = (weekOffset = 0) => {
            const now = new Date();
            const targetDate = new Date(now.getTime() + weekOffset * 7 * 24 * 60 * 60 * 1000);
            
            // ISO 8601 week calculation - korrigiert
            const year = targetDate.getFullYear();
            const jan4 = new Date(year, 0, 4);
            const jan4Day = jan4.getDay() || 7;
            const firstMonday = new Date(jan4.getTime() - (jan4Day - 1) * 24 * 60 * 60 * 1000);
            
            const timeDiff = targetDate.getTime() - firstMonday.getTime();
            let weekNumber = Math.floor(timeDiff / (7 * 24 * 60 * 60 * 1000)) + 1;
            
            if (weekNumber <= 0) {
                weekNumber = 52;
            } else if (weekNumber > 52) {
                weekNumber = 1;
            }
            
            // Get Monday of this week
            const dayOfWeek = targetDate.getDay();
            const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
            const monday = new Date(targetDate.getTime() + mondayOffset * 24 * 60 * 60 * 1000);
            
            // Generate dates for the week
            const weekDates = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(monday.getTime() + i * 24 * 60 * 60 * 1000);
                weekDates.push({
                    day: DAYS,
                    dayName: DAY_NAMES, // EINZELNER Tagesname!
                    date: date,
                    dateString: date.toLocaleDateString('de-DE', { 
                        day: '2-digit', 
                        month: '2-digit'
                    })
                });
            }
            
            return {
                year: year,
                weekNumber: weekNumber,
                weekKey: year + '-W' + String(weekNumber).padStart(2, '0'),
                weekDates,
                displayText: 'KW ' + weekNumber,
                yearText: year,
                dateRange: monday.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }) + 
                          ' - ' + 
                          new Date(monday.getTime() + 6 * 24 * 60 * 60 * 1000).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })
            };
        };

        function AdminApp() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);
            
            const [weekOffset, setWeekOffset] = useState(0);
            const [allWeeklyPrograms, setAllWeeklyPrograms] = useState({});
            const [eventConfig, setEventConfig] = useState({
                active: false,
                image: 'standard.jpg',
                start: '',
                end: ''
            });
            
            const [isSaving, setIsSaving] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [status, setStatus] = useState(null);

            const githubConfig = {
                token: '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',
                owner: 'l-sayginsoy',
                repo: 'drk-display',
                headers: {
                    'Authorization': 'Bearer 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',
                    'Accept': 'application/vnd.github.v3+json',
                    'User-Agent': 'DRK-Admin-App'
                }
            };

            const currentWeek = useMemo(() => getWeekInfo(weekOffset), [weekOffset]);

            const showStatus = (message, type) => {
                setStatus({ message, type });
                setTimeout(() => setStatus(null), 4000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === ADMIN_PASSWORD) {
                    setIsLoggedIn(true);
                    setLoginError(false);
                    loadAllData();
                } else {
                    setLoginError(true);
                }
            };

            const loadAllData = async () => {
                setIsLoading(true);
                try {
                    console.log('🔄 Loading all data from GitHub...');
                    
                    // Load weekly program with cache busting
                    const timestamp = Date.now();
                    const progRes = await fetch(`https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/wochenprogramm.txt?t=${timestamp}`, {
                        headers: githubConfig.headers
                    });
                    
                    if (progRes.ok) {
                        const progData = await progRes.json();
                        const content = atob(progData.content).replace(/\r/g, '');
                        const lines = content.split('\n').filter(line => line.trim());
                        
                        console.log('📄 Loaded lines:', lines.length, lines);
                        
                        const programs = {};
                        
                        lines.forEach(line => {
                            if (line.includes('|')) {
                                const parts = line.split('|').map(s => s.trim());
                                
                                if (parts.length >= 4) {
                                    // Check if it's a week-specific entry (contains year-W pattern)
                                    if (parts.match(/\d{4}-W\d{2}/)) {
                                        const [weekKey, day, title, location, time] = parts;
                                        if (!programs[weekKey]) programs[weekKey] = {};
                                        programs[weekKey][day] = { 
                                            title: title === '-' ? '' : title, 
                                            location: location === '-' ? '' : location, 
                                            time: time === '-' ? '' : time 
                                        };
                                        console.log('📆 Found week entry:', weekKey, day, { title, location, time });
                                    } else {
                                        // Standard day entry
                                        const [day, title, location, time] = parts;
                                        if (!programs['standard']) programs['standard'] = {};
                                        programs['standard'][day] = { 
                                            title: title || '', 
                                            location: location || '', 
                                            time: time || '' 
                                        };
                                        console.log('📆 Found standard entry:', day, { title, location, time });
                                    }
                                }
                            }
                        });
                        
                        console.log('📅 Parsed programs:', Object.keys(programs).length, 'weeks', programs);
                        setAllWeeklyPrograms(programs);
                    } else {
                        console.warn('❌ Could not load weekly program:', progRes.status);
                        showStatus('Wochenprogramm konnte nicht geladen werden', 'error');
                    }

                    // Load event config with cache busting
                    const eventRes = await fetch(`https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/event.txt?t=${timestamp}`, {
                        headers: githubConfig.headers
                    });
                    
                    if (eventRes.ok) {
                        const eventData = await eventRes.json();
                        const content = atob(eventData.content).replace(/\r/g, '');
                        const lines = content.split('\n');
                        const config = {};
                        
                        lines.forEach(line => {
                            const [key, ...value] = line.split(':');
                            if (key && value.length) {
                                config[key.trim().toLowerCase()] = value.join(':').trim();
                            }
                        });

                        setEventConfig({
                            active: config.aktiv === 'ja',
                            image: config.bild || 'standard.jpg',
                            start: config.start || '',
                            end: config.ende || ''
                        });
                    }
                } catch (error) {
                    console.error('💥 Load error:', error.message, error);
                    showStatus(`❌ Fehler beim Laden: ${error.message}`, 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            // Get current week's data - try week-specific first, then fall back to standard
            const getCurrentWeekData = () => {
                const weekData = allWeeklyPrograms[currentWeek.weekKey] || allWeeklyPrograms['standard'] || {};
                console.log('📊 Week data for', currentWeek.weekKey + ':', weekData);
                return DAYS.map(day => ({
                    day,
                    title: weekData[day]?.title || '',
                    location: weekData[day]?.location || '',
                    time: weekData[day]?.time || ''
                }));
            };

            const updateActivity = (dayIndex, field, value) => {
                const day = DAYS[dayIndex];
                const weekKey = currentWeek.weekKey;
                
                setAllWeeklyPrograms(prev => ({
                    ...prev,
                    [weekKey]: {
                        ...prev[weekKey],
                        [day]: {
                            ...prev[weekKey]?.[day],
                            [field]: value
                        }
                    }
                }));
            };

            const saveData = async () => {
                setIsSaving(true);
                console.log('💾 Starting save process...');
                try {
                    // Build complete program content - PRESERVE ALL WEEKS
                    let progContent = '';
                    
                    console.log('📋 Current data to save:', allWeeklyPrograms);
                    
                    // Add standard entries first (if any)
                    if (allWeeklyPrograms['standard']) {
                        Object.entries(allWeeklyPrograms['standard']).forEach(([day, data]) => {
                            if (data.title || data.location || data.time) {
                                progContent += `${day}|${data.title}|${data.location}|${data.time}\n`;
                            }
                        });
                    }
                    
                    // Add ALL week-specific entries (not just current week!)
                    Object.entries(allWeeklyPrograms).forEach(([weekKey, weekData]) => {
                        if (weekKey !== 'standard') {
                            Object.entries(weekData).forEach(([day, data]) => {
                                if (data.title || data.location || data.time) {
                                    progContent += `${weekKey}|${day}|${data.title || '-'}|${data.location || '-'}|${data.time || '-'}\n`;
                                }
                            });
                        }
                    });

                    console.log('📝 Content to save:', progContent);

                    // Get current file SHA for proper update
                    const progRes = await fetch(`https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/wochenprogramm.txt`, {
                        headers: githubConfig.headers
                    });

                    let progSha = '';
                    if (progRes.ok) {
                        const data = await progRes.json();
                        progSha = data.sha;
                        console.log('✅ Got file SHA:', progSha);
                    } else {
                        console.warn('⚠️ Could not get current SHA:', progRes.status);
                        throw new Error(`Failed to get current file SHA: ${progRes.status}`);
                    }

                    // Save program with proper SHA
                    const saveRes = await fetch(`https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/wochenprogramm.txt`, {
                        method: 'PUT',
                        headers: {
                            ...githubConfig.headers,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Update ${currentWeek.weekKey} from admin dashboard`,
                            content: btoa(progContent.trim()),
                            sha: progSha
                        })
                    });

                    if (!saveRes.ok) {
                        const errorData = await saveRes.text();
                        console.error('❌ Save failed:', saveRes.status, errorData);
                        throw new Error(`Save failed: ${saveRes.status} - ${errorData}`);
                    }

                    console.log('✅ Program saved successfully');

                    // Save event config with proper SHA handling
                    const eventContent = [
                        `aktiv: ${eventConfig.active ? 'ja' : 'nein'}`,
                        `bild: ${eventConfig.image}`,
                        `start: ${eventConfig.start}`,
                        `ende: ${eventConfig.end}`
                    ].join('\n');

                    const eventRes = await fetch(`https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/event.txt`, {
                        headers: githubConfig.headers
                    });

                    let eventSha = '';
                    if (eventRes.ok) {
                        const data = await eventRes.json();
                        eventSha = data.sha;
                        console.log('✅ Got event SHA:', eventSha);
                    } else {
                        console.warn('⚠️ Could not get event SHA:', eventRes.status);
                    }

                    const eventSaveRes = await fetch(`https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/event.txt`, {
                        method: 'PUT',
                        headers: {
                            ...githubConfig.headers,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: 'Update event config from admin',
                            content: btoa(eventContent),
                            sha: eventSha || undefined
                        })
                    });

                    if (!eventSaveRes.ok) {
                        const errorData = await eventSaveRes.text();
                        console.error('❌ Event save failed:', eventSaveRes.status, errorData);
                        throw new Error(`Event save failed: ${eventSaveRes.status} - ${errorData}`);
                    }

                    console.log('✅ Event config saved successfully');

                    showStatus(`✅ ${currentWeek.displayText} erfolgreich gespeichert!`, 'success');
                    
                    // Auto-reload after 2 seconds to confirm changes
                    setTimeout(() => {
                        console.log('🔄 Auto-reloading data to confirm save...');
                        loadAllData();
                    }, 2000);
                } catch (error) {
                    console.error('💥 Save error:', error.message, error);
                    showStatus(`❌ Fehler beim Speichern: ${error.message}`, 'error');
                } finally {
                    setIsSaving(false);
                }
            };

            const currentWeekData = getCurrentWeekData();

            // Quick jump to current week
            const jumpToCurrentWeek = () => setWeekOffset(0);

            // Login Screen
            if (!isLoggedIn) {
                return React.createElement('div', { 
                    className: "min-h-screen bg-gradient-to-br from-red-50 via-orange-50 to-amber-50 flex items-center justify-center p-4" 
                },
                    React.createElement('div', { 
                        className: "bg-white rounded-3xl shadow-2xl p-12 w-full max-w-md border border-red-100" 
                    },
                        React.createElement('div', { className: "text-center mb-8" },
                            React.createElement('div', { 
                                className: "w-20 h-20 bg-red-600 rounded-2xl mx-auto mb-6 flex items-center justify-center" 
                            },
                                React.createElement('span', { 
                                    className: "text-white font-black text-2xl" 
                                }, "DRK")
                            ),
                            React.createElement('h1', { 
                                className: "text-3xl font-black text-slate-900 tracking-tight" 
                            }, "🔐 Admin Login"),
                            React.createElement('p', { 
                                className: "text-slate-500 font-medium mt-2" 
                            }, "DRK Melm Dashboard")
                        ),
                        React.createElement('form', { 
                            onSubmit: handleLogin, 
                            className: "space-y-6" 
                        },
                            React.createElement('input', {
                                type: "password",
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                className: "w-full px-6 py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl font-bold text-center text-xl focus:border-red-600 outline-none transition-colors",
                                placeholder: "Passwort eingeben"
                            }),
                            loginError && React.createElement('p', { 
                                className: "text-red-600 font-bold text-sm text-center" 
                            }, "❌ Falsches Passwort"),
                            React.createElement('button', { 
                                type: "submit",
                                className: "w-full bg-red-600 text-white font-black py-4 rounded-2xl hover:bg-red-700 transition-colors uppercase tracking-wide"
                            }, "Einloggen")
                        )
                    )
                );
            }

            // Main Dashboard
            return React.createElement('div', { className: "min-h-screen bg-slate-50" },
                // Status Message
                status && React.createElement('div', { 
                    className: 'fixed top-4 right-4 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl font-bold ' +
                        (status.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white')
                }, status.message),

                // Header
                React.createElement('header', { className: "bg-white border-b border-slate-200 px-6 py-4" },
                    React.createElement('div', { className: "max-w-6xl mx-auto flex items-center justify-between" },
                        React.createElement('div', { className: "flex items-center gap-4" },
                            React.createElement('div', { 
                                className: "w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center" 
                            },
                                React.createElement('span', { className: "text-white font-black" }, "DRK")
                            ),
                            React.createElement('div', null,
                                React.createElement('h1', { 
                                    className: "text-2xl font-black text-slate-900 tracking-tight" 
                                }, "🏥 Admin Dashboard"),
                                React.createElement('p', { 
                                    className: "text-slate-500 font-medium text-sm" 
                                }, "DRK Melm Verwaltung")
                            )
                        ),
                        React.createElement('button', {
                            onClick: () => setIsLoggedIn(false),
                            className: "px-4 py-2 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-900 transition-colors"
                        }, "🚪 Logout")
                    )
                ),

                // Week Navigation
                React.createElement('div', { className: "max-w-6xl mx-auto p-6" },
                    React.createElement('div', { className: "flex items-center justify-center gap-4 mb-6" },
                        React.createElement('button', {
                            onClick: () => setWeekOffset(weekOffset - 1),
                            className: "px-6 py-3 bg-slate-200 hover:bg-slate-300 rounded-2xl font-bold text-slate-700 week-nav-btn"
                        }, "← Vorherige"),
                        
                        React.createElement('div', { 
                            className: "px-8 py-4 bg-red-600 text-white rounded-2xl text-center font-black" 
                        },
                            React.createElement('div', { className: "text-xl" }, currentWeek.displayText + " • " + currentWeek.yearText),
                            React.createElement('div', { className: "text-sm opacity-90" }, currentWeek.dateRange)
                        ),
                        
                        React.createElement('button', {
                            onClick: () => setWeekOffset(weekOffset + 1),
                            className: "px-6 py-3 bg-slate-200 hover:bg-slate-300 rounded-2xl font-bold text-slate-700 week-nav-btn"
                        }, "Nächste →")
                    ),
                    
                    weekOffset !== 0 && React.createElement('div', { className: "text-center mb-6" },
                        React.createElement('button', {
                            onClick: jumpToCurrentWeek,
                            className: "px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors"
                        }, "🏠 Zurück zur aktuellen Woche")
                    )
                ),

                // Main Content
                React.createElement('main', { className: "max-w-6xl mx-auto p-6 space-y-8" },
                    React.createElement('div', { className: "flex justify-end" },
                        React.createElement('button', {
                            onClick: saveData,
                            disabled: isSaving || isLoading,
                            className: "px-8 py-4 bg-green-600 text-white font-black rounded-2xl hover:bg-green-700 transition-colors disabled:opacity-50 shadow-lg"
                        }, isSaving ? '⏳ Speichert...' : '💾 Speichern')
                    ),

                    React.createElement('div', { className: "grid grid-cols-1 lg:grid-cols-3 gap-8" },
                        // Weekly Program - Takes 2/3 width
                        React.createElement('div', { 
                            className: "lg:col-span-2 bg-white rounded-3xl p-8 shadow-sm border border-slate-200" 
                        },
                            React.createElement('div', { className: "flex items-center justify-between mb-8" },
                                React.createElement('h2', { 
                                    className: "text-3xl font-black text-slate-900" 
                                }, "📅 Wochenprogramm"),
                                React.createElement('div', { 
                                    className: "text-lg font-bold text-red-600 bg-red-100 px-4 py-2 rounded-xl" 
                                }, currentWeek.displayText + " • " + currentWeek.yearText)
                            ),
                            
                            React.createElement('div', { className: "space-y-6" },
                                currentWeekData.map((entry, index) => {
                                    const dateInfo = currentWeek.weekDates[index];
                                    const today = new Date();
                                    const isToday = dateInfo.date.toDateString() === today.toDateString();
                                    
                                    return React.createElement('div', { 
                                        key: entry.day, 
                                        className: "bg-slate-50 rounded-2xl p-6 border-2 " + (isToday ? "border-orange-300 bg-orange-50" : "border-slate-100")
                                    },
                                        // Day Header
                                        React.createElement('div', { className: "flex items-center justify-between mb-4" },
                                            React.createElement('div', { className: "flex items-center gap-3" },
                                                React.createElement('span', { 
                                                    className: "text-2xl font-black " + (isToday ? "text-orange-600" : "text-slate-900")
                                                }, entry.day),
                                                React.createElement('div', null,
                                                    React.createElement('div', { 
                                                        className: "text-lg font-bold " + (isToday ? "text-orange-700" : "text-slate-700")
                                                    }, dateInfo.dayName), // EINZELNER Tagesname!
                                                    React.createElement('div', { 
                                                        className: "text-sm font-medium " + (isToday ? "text-orange-600" : "text-slate-500")
                                                    }, dateInfo.dateString)
                                                )
                                            ),
                                            (entry.title || entry.location || entry.time) && React.createElement('div', { 
                                                className: "text-xs font-bold text-green-600 bg-green-100 px-2 py-1 rounded"
                                            }, "Geplant")
                                        ),
                                        
                                        // Input Fields
                                        React.createElement('div', { className: "grid grid-cols-12 gap-4" },
                                            // Activity - 5 columns
                                            React.createElement('div', { className: "col-span-5" },
                                                React.createElement('label', { 
                                                    className: "block text-sm font-bold text-slate-600 mb-2" 
                                                }, "AKTIVITÄT"),
                                                React.createElement('input', {
                                                    type: "text",
                                                    value: entry.title,
                                                    onChange: (e) => updateActivity(index, 'title', e.target.value),
                                                    placeholder: "Was findet statt?",
                                                    className: "w-full px-4 py-3 border-2 border-slate-200 rounded-xl font-medium focus:border-red-600 outline-none transition-colors"
                                                })
                                            ),
                                            
                                            // Location - 4 columns
                                            React.createElement('div', { className: "col-span-4" },
                                                React.createElement('label', { 
                                                    className: "block text-sm font-bold text-slate-600 mb-2" 
                                                }, "ORT"),
                                                React.createElement('select', {
                                                    value: entry.location,
                                                    onChange: (e) => updateActivity(index, 'location', e.target.value),
                                                    className: "w-full px-4 py-3 border-2 border-slate-200 rounded-xl font-medium focus:border-red-600 outline-none transition-colors"
                                                },
                                                    React.createElement('option', { value: "" }, "Ort wählen..."),
                                                    LOCATIONS.map(location =>
                                                        React.createElement('option', { 
                                                            key: location, 
                                                            value: location 
                                                        }, location)
                                                    )
                                                )
                                            ),
                                            
                                            // Time - 3 columns
                                            React.createElement('div', { className: "col-span-3" },
                                                React.createElement('label', { 
                                                    className: "block text-sm font-bold text-slate-600 mb-2" 
                                                }, "ZEIT"),
                                                React.createElement('input', {
                                                    type: "time",
                                                    value: entry.time,
                                                    onChange: (e) => updateActivity(index, 'time', e.target.value),
                                                    className: "w-full px-4 py-3 border-2 border-slate-200 rounded-xl font-medium focus:border-red-600 outline-none transition-colors"
                                                })
                                            )
                                        )
                                    );
                                })
                            )
                        ),

                        // Event Config - Takes 1/3 width
                        React.createElement('div', { 
                            className: "bg-slate-900 text-white rounded-3xl p-6 h-fit sticky top-32 shadow-lg" 
                        },
                            React.createElement('h2', { 
                                className: "text-xl font-black mb-6" 
                            }, "Event-Modus"),
                            
                            // Status Toggle
                            React.createElement('div', { className: "mb-6" },
                                React.createElement('label', { 
                                    className: "text-sm font-bold text-white/70 block mb-2" 
                                }, "STATUS"),
                                React.createElement('div', { 
                                    className: "grid grid-cols-2 gap-2 bg-white/10 p-1 rounded-xl" 
                                },
                                    React.createElement('button', {
                                        onClick: () => setEventConfig(prev => ({ ...prev, active: true })),
                                        className: 'py-3 px-4 rounded-lg font-bold text-sm transition-all ' +
                                            (eventConfig.active ? 'bg-green-600 text-white' : 'text-white/50 hover:text-white')
                                    }, "AKTIV"),
                                    React.createElement('button', {
                                        onClick: () => setEventConfig(prev => ({ ...prev, active: false })),
                                        className: 'py-3 px-4 rounded-lg font-bold text-sm transition-all ' +
                                            (!eventConfig.active ? 'bg-red-600 text-white' : 'text-white/50 hover:text-white')
                                    }, "AUS")
                                )
                            ),

                            // Event Details
                            React.createElement('div', { className: "space-y-4" },
                                React.createElement('div', null,
                                    React.createElement('label', { 
                                        className: "text-sm font-bold text-white/70 block mb-2" 
                                    }, "BILDDATEI"),
                                    React.createElement('input', {
                                        type: "text",
                                        value: eventConfig.image,
                                        onChange: (e) => setEventConfig(prev => ({ ...prev, image: e.target.value })),
                                        placeholder: "standard.jpg",
                                        className: "w-full px-3 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50 focus:border-white/40 outline-none transition-all"
                                    })
                                ),
                                React.createElement('div', null,
                                    React.createElement('label', { 
                                        className: "text-sm font-bold text-white/70 block mb-2" 
                                    }, "START"),
                                    React.createElement('input', {
                                        type: "datetime-local",
                                        value: eventConfig.start,
                                        onChange: (e) => setEventConfig(prev => ({ ...prev, start: e.target.value })),
                                        className: "w-full px-3 py-3 bg-white/10 border border-white/20 rounded-xl text-white focus:border-white/40 outline-none transition-all"
                                    })
                                ),
                                React.createElement('div', null,
                                    React.createElement('label', { 
                                        className: "text-sm font-bold text-white/70 block mb-2" 
                                    }, "ENDE"),
                                    React.createElement('input', {
                                        type: "datetime-local",
                                        value: eventConfig.end,
                                        onChange: (e) => setEventConfig(prev => ({ ...prev, end: e.target.value })),
                                        className: "w-full px-3 py-3 bg-white/10 border border-white/20 rounded-xl text-white focus:border-white/40 outline-none transition-all"
                                    })
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(AdminApp));
    </script>
</body>
</html>
